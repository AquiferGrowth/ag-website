backend:
  name: github
  repo: AquiferGrowth/ag-website
  branch: main
  base_url: https://ag-website-oauth.divjot-6b1.workers.dev

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "string"}
      - {label: "Publish Date", name: "pubDate", widget: "datetime"}
      - {label: "Hero Image", name: "heroImage", widget: "image", required: false}
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options:
          - { label: "Growth", value: "Growth" }
          - { label: "AI & Automation", value: "AI & Automation" }
          - { label: "Design", value: "Design" }
          - { label: "Dev", value: "Dev" }
          - { label: "Strategy", value: "Strategy" }
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "team"
    label: "Team Members"
    folder: "src/content/team"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Bio", name: "bio", widget: "text"}
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "LinkedIn URL", name: "linkedin", widget: "string", required: false}
      - {label: "Twitter URL", name: "twitter", widget: "string", required: false}
      - {label: "Order", name: "order", widget: "number", default: 99, required: false}

  - name: "categories"
    label: "Categories"
    folder: "src/content/categories"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Category Slug", name: "categorySlug", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - label: "Color"
        name: "color"
        widget: "select"
        required: false
        options:
          - { label: "Orange", value: "#FF5500" }
          - { label: "Blue", value: "#3B82F6" }
          - { label: "Green", value: "#10B981" }
          - { label: "Purple", value: "#8B5CF6" }
          - { label: "Red", value: "#EF4444" }
      - {label: "Icon (emoji)", name: "icon", widget: "string", required: false}

  - name: "testimonials"
    label: "Testimonials"
    folder: "src/content/testimonials"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{author}} | {{company}}"
    sortable_fields: ["order", "author"]
    fields:
      - {label: "Quote", name: "quote", widget: "text"}
      - {label: "Author Name", name: "author", widget: "string"}
      - {label: "Company", name: "company", widget: "string", required: false}
      - {label: "Role / Title", name: "role", widget: "string", required: false}
      - {label: "Avatar", name: "avatar", widget: "image", required: false}
      - {label: "Featured", name: "featured", widget: "boolean", default: false, required: false}
      - {label: "Order", name: "order", widget: "number", default: 99, value_type: "int", min: 1, required: false, hint: "Lower numbers appear first on the homepage"}

  - name: "case-studies"
    label: "Case Studies"
    folder: "src/content/caseStudies"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - {label: "Title (Internal)", name: "title", widget: "string"}
      - {label: "Headline", name: "headline", widget: "string"}
      - {label: "Description/Intro", name: "description", widget: "text"}
      - {label: "ROI (e.g., 42x)", name: "roi", widget: "string"}
      - {label: "Impact (e.g., $10k Saved/mo)", name: "info", widget: "string"}
      - {label: "Industry", name: "industry", widget: "string"}
      - {label: "Platform", name: "platform", widget: "string"}
      - {label: "Featured Image", name: "image", widget: "image"}
      - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: false}
      - {label: "Client URL", name: "clientUrl", widget: "string", required: false}
      - {label: "Logo Text (e.g., LIVE)", name: "logoText", widget: "string", required: false}
      - {label: "Logo Brand (e.g., HEALTHILLIE)", name: "logoBrand", widget: "string", required: false}
      - label: "Challenges"
        name: "challenges"
        widget: "list"
        required: false
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "text"}
      - label: "Solutions"
        name: "solutions"
        widget: "list"
        required: false
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "text"}
      - {label: "Final Results Summary", name: "results", widget: "text", required: false}
      - {label: "Publish Date", name: "pubDate", widget: "datetime"}
      - {label: "Body content", name: "body", widget: "markdown", required: false}
